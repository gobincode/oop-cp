{% extends 'index.html' %}
{% load static %}
{% block body %}

<style>
    .chat-container {
        max-width: 900px;
        margin: 2rem auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    
    .chat-header {
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
        padding: 1.5rem;
        text-align: center;
    }
    
    .chat-header h2 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
    }
    
    .chat-header p {
        margin: 0.5rem 0 0 0;
        opacity: 0.9;
        font-size: 0.9rem;
    }
    
    .chat-messages {
        height: 500px;
        overflow-y: auto;
        padding: 2rem;
        background: linear-gradient(to bottom, #f8f9fa 0%, #ffffff 100%);
    }
    
    .message {
        margin-bottom: 1.5rem;
        display: flex;
        animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
        justify-content: flex-end;
    }
    
    .message-content {
        max-width: 70%;
        padding: 1rem 1.25rem;
        border-radius: 18px;
        position: relative;
    }
    
    .message.bot .message-content {
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
        border-bottom-left-radius: 4px;
    }
    
    .message.user .message-content {
        background: linear-gradient(135deg, #6b8c6e 0%, #14b8a6 100%);
        color: white;
        border-bottom-right-radius: 4px;
    }
    
    .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        margin: 0 0.75rem;
    }
    
    .message.bot .message-avatar {
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
    }
    
    .message.user .message-avatar {
        background: linear-gradient(135deg, #6b8c6e 0%, #14b8a6 100%);
        color: white;
    }
    
    .chat-input-container {
        padding: 1.5rem;
        background: white;
        border-top: 1px solid #e5e7eb;
    }
    
    .chat-input-form {
        display: flex;
        gap: 1rem;
    }
    
    .chat-input {
        flex: 1;
        padding: 0.875rem 1.25rem;
        border: 2px solid #e5e7eb;
        border-radius: 25px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }
    
    .chat-input:focus {
        outline: none;
        border-color: #5c3d2e;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .chat-send-btn {
        padding: 0.875rem 2rem;
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .chat-send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .chat-send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    
    .typing-indicator {
        display: none;
        padding: 1rem 1.25rem;
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        max-width: 70px;
    }
    
    .typing-indicator.active {
        display: inline-block;
    }
    
    .typing-indicator span {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: white;
        margin: 0 2px;
        animation: typing 1.4s infinite;
    }
    
    .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
    }
    
    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-10px); }
    }
    
    .quick-questions {
        padding: 1rem 2rem;
        background: #f8f9fa;
        border-top: 1px solid #e5e7eb;
    }
    
    .quick-questions h4 {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 0.75rem;
        font-weight: 600;
    }
    
    .quick-question-btn {
        display: inline-block;
        padding: 0.5rem 1rem;
        margin: 0.25rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        font-size: 0.875rem;
        color: #4b5563;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .quick-question-btn:hover {
        background: linear-gradient(135deg, #5c3d2e 0%, #3d2619 100%);
        color: white;
        border-color: transparent;
        transform: translateY(-2px);
    }
    
    .welcome-message {
        text-align: center;
        padding: 2rem;
        color: #6b7280;
    }
    
    .welcome-message i {
        font-size: 3rem;
        color: #5c3d2e;
        margin-bottom: 1rem;
    }
